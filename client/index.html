<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>symon</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="./symon.css">
  </head>
  <body>
    <main id="symon" class="container-fluid">
      <div class="row">
        <div class="col-sm-12 col-md-12">
          <form class="well form-inline">
            <fieldset class="text-center">
              <div class="form-group form-group-sm">
                <label>command</label>
                <input type="text"
                  placeholder="bash, postgresql, atom, symon, ..."
                  class="form-control"
                  v-model="criteria.command"
                  style="width:480px"/>
              </div>
              <div class="form-group form-group-sm">
                <label>user</label>
                <select class="form-control" v-model.trim="criteria.user">
                  <option v-for="u in users" :value="u">{{u.toLowerCase()}}</option>
                </select>
              </div>
              <div class="form-group form-group-sm">
                <label>group</label>
                <select class="form-control" v-model.trim="criteria.group">
                  <option v-for="g in groups" :value="g">{{g.toLowerCase()}}</option>
                </select>
              </div>
              <div class="form-group form-group-sm">
                <label>state</label>
                <select class="form-control" v-model.trim="criteria.state">
                  <option v-for="s in states" :value="s">{{s}}</option>
                </select>
              </div>
            </fieldset>
          </form>
          <aside v-if="error" class="alert alert-danger">
            <p class="text-center"><strong>{{error}}</strong></p>
          </aside>
          <table class="table table-hover">
            <thead>
              <tr>
                <th class="text-center">#</th>
                <th>user</th>
                <th class="text-center">pid</td>
                <th class="text-center">ppid</td>
                <th class="text-center">state</td>
                <th>command</td>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(p, i) in all">
                <td class="text-center" width="5%">{{i+1}}</td>
                <td width="10%">{{p.user}}</td>
                <td class="text-center" width="5%">{{p.pid}}</td>
                <td class="text-center" width="5%">{{p.ppid}}</td>
                <td class="text-center" width="15%">{{p.state}}</td>
                <td>{{p.command}}</td>
              </tr>
            </tbody>
          </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.4/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <script src="./app.js"></script>
  </body>
</html>
